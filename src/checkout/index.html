<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sleep Outside | Checkout</title>

    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/checkout.js" type="module"></script>
  </head>

  <body>
    <header class="divider" id="main-header"></header>

    <main class="divider" id="add">
      <section class="products">
        <h2>Review & Place your Order</h2>
      </section>
      <section class="second">
        <form method="get" id="checkOut">
          <fieldset>
            <legend>Personal Information</legend>
            <label for="firstname">First Name</label>
            <input
              type="text"
              name="fname"
              id="firstname"
              title="First name"
              required
            />
            <label for="lastname">Last Name</label>
            <input
              type="text"
              name="lname"
              id="lastname"
              title="Last Name"
              required
            />
          </fieldset>

          <fieldset>
            <legend>Address</legend>
            <label for="address">Street Address </label>
            <input
              type="text"
              id="address"
              name="street"
              title="Street Address"
              required
            />
            <label for="city">City</label>
            <input type="text" name="city" id="city" title="city" required />
            <label for="state">State</label>
            <input type="text" name="state" id="state" title="state" required />
            <label for="zip">Zip Code </label>
            <input type="text" name="zip" id="zip" title="zipcode" required />
          </fieldset>

          <fieldset>
            <legend>Payment</legend>
            <label for="cardNumber">Card Number</label>
            <input
              type="string"
              title="credit card number"
              id="cardNumber"
              name="cardNumber"
              required
            />
            <label for="exp">Expiration Date</label>
            <input type="text" name="expiration" id="exp" required />
            <label for="code">CVV</label>
            <input
              type="text"
              name="code"
              maxlength="3"
              id="code"
              title="security code"
              required
            />
          </fieldset>
          <button id="submit">Place Order</button>
        </form>
      </section>
      <section class="order-summary">
        <h2>Order Summary</h2>
        <p>SubTotal: <span id="subtotal"></span></p>
        <p>Total Order Items: <span id="itemNum"></span></p>
        <p>Tax: <span id="tax"></span></p>
        <p>Shipping Fee: <span id="ShippingFee"></span></p>
        <p>Total Amount: <span id="totalamt"></span></p>
      </section>
    </main>

    <footer id="main-footer"></footer>
    <!-- &copy;NOT a real business -->
  </body>
</html>
