<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sleep Outside | Checkout</title>

    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/checkout.js" type="module"></script>
  </head>

  <body>
    <header class="divider" id="main-header">
      
    </header>

    <main class="divider">
      <section class="products">
        <h2>Review & Place your Order</h2>
      </section>
      <section>
        <form method="get">
           <fieldset>
            <legend>Personal Information</legend>
          <label for="username">First Name<input type="text" name="fname" id="username" title="First name" required></label>
          <label for="lastname">Last Name<input type="text" name="lname" id="lastname" title="Last Name" required></label>
           </fieldset>
           <fieldset>
            <legend>Address</legend>
            <label for="address">Street Address <input type="text" id="address" name="address" title="Street Address" required></label>
            <label for="city">City<input type="text" name="city" id="city" title="city" required></label>
            <label for="state">State<input type="text" name="state" id="state" title="state" required></label>
            <label for="zip">Zip Code <input type="number" name="zip" id="zip" title="zipcode" required></label>
           </fieldset>
           <fieldset>
            <legend>Payment</legend>
            <label for="cardNumber">Card Number<input type="number" title="credit card number" id="cardNumber" name="cardNumber" required></label>
            <label for="exp">Expiration Date<input type="date" name="expiration" id="exp" required></label>
            <label for="code">CVV<input type="number" name="code" maxlength="3" id="code" title="security code" required></label>
            <input type="text" name="order-date" id="order-date" hidden>
           </fieldset>
           <button>Submit Order</button>
        </form>
      </section>
      <section class="order-summary">
        <h2>Order Summary </h2>
        <p>SubTotal: <span id="subtotal"></span></p>
        <p>Total Ordered Items: <span id="itemNum"></span></p>
        <p>Tax: <span id="tax"></span></p>
        <p>Shipping Fee: <span id="ShippingFee"></span></p>
        <p>Total Amount: <span id="totalamt"></span></p>
      </section>
    </main>

    <footer id="main-footer"></footer>
    <!-- &copy;NOT a real business -->
  </body>
</html>
