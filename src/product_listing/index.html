<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Products</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/product-listing.js" type="module"></script>
  </head>

  <body>
    <header class="divider" id="main-header"></header>
    <main class="divider">
      <form method="get" class="searchBar">
        <label>
          <input
            type="text"
            id="search"
            name="product-id"
            placeholder="Search by Id e.g 543DR"
          />
          <img
            src="../images/search.svg"
            alt="search icon"
            loading="lazy"
            id="searchIcon"
          />
        </label>
      </form>
      <section class="products">
        <h2>Top Products: <span class="title highlight"></span></h2>
        <ul class="product-list"></ul>
      </section>
    </main>
    <footer id="main-footer"></footer>
  </body>
</html>
